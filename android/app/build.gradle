apply plugin: 'com.android.application'

android {
    namespace = "com.mesenae.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.mesenae.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    // Read signing configurations from environment file or environment variables
    def envMap = [:]
    def envFile = file("${project.rootDir}/../.env")
    if (envFile.exists()) {
        envFile.eachLine { line ->
            def trimmed = line.trim()
            if (trimmed && !trimmed.startsWith('#') && trimmed.contains('=')) {
                def parts = trimmed.split('=', 2)
                if (parts.length == 2) {
                    envMap[parts[0].trim()] = parts[1].trim()
                }
            }
        }
    }

    signingConfigs {
        release {
            def keystorePath = envMap["RELEASE_KEYSTORE_PATH"] ?: System.getenv("RELEASE_KEYSTORE_PATH")
            if (keystorePath) {
                def keystoreFile = file(keystorePath)
                if (!keystoreFile.exists()) {
                    keystoreFile = file("${project.rootDir}/../${keystorePath}")
                }
                storeFile keystoreFile
            } else {
                def uploadKeyFile = file("${project.rootDir}/../my-upload-key.jks")
                if (uploadKeyFile.exists()) {
                    storeFile uploadKeyFile
                } else {
                    storeFile file('release.keystore')
                }
            }
            storePassword envMap["RELEASE_STORE_PASSWORD"] ?: System.getenv("RELEASE_STORE_PASSWORD") ?: 'ahmadabdulbasith'
            keyAlias envMap["RELEASE_KEY_ALIAS"] ?: System.getenv("RELEASE_KEY_ALIAS") ?: 'mesenae'
            keyPassword envMap["RELEASE_KEY_PASSWORD"] ?: System.getenv("RELEASE_KEY_PASSWORD") ?: 'ahmadabdulbasith'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            crunchPngs true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    // Only split the APK when we're NOT building an App Bundle (AAB) to save APK size
    def isBundleTask = gradle.startParameter.taskNames.any { it.toLowerCase().contains("bundle") }

    splits {
        abi {
            enable !isBundleTask
            reset()
            include "armeabi-v7a", "arm64-v8a"
            universalApk true
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    
    // Add Firebase dependencies to compile MainActivity.java successfully when google-services.json is missing
    implementation platform('com.google.firebase:firebase-bom:34.14.0')
    implementation 'com.google.firebase:firebase-common'
    implementation 'com.google.firebase:firebase-messaging'
}

apply from: 'capacitor.build.gradle'

apply plugin: 'com.google.gms.google-services'

// Auto-fix for Cordova Printer AndroidX Imports on-the-fly right before preBuild
tasks.register("fixCordovaPrinterX") {
    doFirst {
        println "==== Running Auto-fix for Cordova Printer AndroidX Imports ===="
        def printerDir = file("${project.rootDir}/capacitor-cordova-android-plugins/src/main/java/de/appplant/cordova/plugin/printer")
        if (printerDir.exists()) {
            printerDir.eachFileMatch(~/.*\.java/) { javaFile ->
                println "Patching: ${javaFile.name}"
                def content = javaFile.text
                content = content.replaceAll('import android\\.support\\.annotation\\.NonNull;', 'import androidx.annotation.NonNull;')
                content = content.replaceAll('import android\\.support\\.annotation\\.Nullable;', 'import androidx.annotation.Nullable;')
                content = content.replaceAll('import android\\.support\\.v4\\.print\\.PrintHelper;', 'import androidx.print.PrintHelper;')
                content = content.replaceAll('import android\\.support\\.v4\\.content\\.FileProvider;', 'import androidx.core.content.FileProvider;')
                content = content.replaceAll('import static android\\.support\\.v4\\.print\\.PrintHelper\\.', 'import static androidx.print.PrintHelper.')
                javaFile.write(content)
            }
            println "==== Auto-fix for Cordova Printer completed successfully ===="
        } else {
            println "==== Cordova printer directory not found, skipping patch ===="
        }
    }
}

project.afterEvaluate {
    if (project.tasks.findByName("preBuild")) {
        preBuild.dependsOn("fixCordovaPrinterX")
    }
}

