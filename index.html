  <style>
    /* Warna awal sebelum React mount — cocok untuk light & dark mode.
       Capacitor menampilkan splash screen native sehingga warna ini
       hanya terlihat di web browser (bukan di dalam app Android/iOS). */
    html, body {
      background-color: #0f172a;
    }
    /* Override di light mode: pakai putih bersih */
    @media (prefers-color-scheme: light) {
      html:not(.dark), body:not(.dark) {
        background-color: #f8fafc;
      }
    }
  </style>

  <script>
    // Inline dark mode initialization tetap dipertahankan
    // agar Tailwind bisa langsung membaca class 'dark' saat React merender UI
    (function() {
      const savedTheme = localStorage.getItem('mesenae-theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
